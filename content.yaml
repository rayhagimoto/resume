projects:
  - title: Axion String Network Parameter Estimation with Neural Networks
    description: |
      Built and trained spherical convolutional neural networks (SCNNs) to extract axion model parameters 
      from simulated cosmic microwave background data. Outperformed standard power spectrum methods by resolving 
      degenerate parameter combinations. Evaluated robustness to simulated noise matching future CMB experiments.

  - title: Cosmic Birefringence Modeling from String-Wall Networks
    description: |
      Designed simulation framework for axion topological defects interacting with CMB photons. 
      Used real telescope data to place the first constraints on collapsing axion string-wall networks.

  - title: Statistical Inference of Anisotropic Signals in the CMB
    description: |
      Applied high-volume Monte Carlo and statistical estimators to characterize 
      non-Gaussian signals in CMB polarization patterns. Used kurtosis and bispectrum to test axion signatures.